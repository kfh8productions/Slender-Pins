  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Slender Pins — Task Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e8e0;
    --muted: #666;
    --muted2: #444;
    --urgent1: #ff2b2b;
    --urgent2: #ff6a00;
    --urgent3: #ffc300;
    --neutral: #888;
    --calm1: #3a9bd5;
    --calm2: #2563eb;
    --calm3: #1e3a8a;
    --green: #22c55e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  .band-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .subtitle {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sync-indicator {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .sync-dot.live    { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
  .sync-dot.error   { background: var(--urgent1); }

  .add-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: border-color 0.2s;
    text-transform: uppercase;
  }
  .add-btn:hover { border-color: var(--text); }

  .legend {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .legend-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-right: 4px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .filter-bar {
    padding: 10px 24px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 4px 12px;
    cursor: pointer;
    border-radius: 100px;
    white-space: nowrap;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .filter-chip.active { border-color: var(--text); color: var(--text); }

  .board {
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 680px;
    margin: 0 auto;
  }

  .task {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 6px 1fr auto;
    gap: 12px;
    align-items: start;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .task:active { transform: scale(0.985); }
  .task.done { opacity: 0.35; }
  .task.done .task-title { text-decoration: line-through; }

  .urgency-bar {
    width: 6px;
    border-radius: 3px;
    align-self: stretch;
    min-height: 40px;
    flex-shrink: 0;
  }

  .task-body { display: flex; flex-direction: column; gap: 5px; }
  .task-title { font-size: 0.85rem; font-weight: 500; color: var(--text); line-height: 1.3; letter-spacing: 0.02em; }
  .task-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .task-assignee { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .task-due { font-size: 0.6rem; letter-spacing: 0.08em; color: var(--muted); }
  .task-due.overdue { color: var(--urgent1); }

  .task-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .heat-btn {
    background: none; border: none;
    font-size: 0.6rem; color: var(--muted);
    cursor: pointer; font-family: 'DM Mono', monospace;
    padding: 2px 0; transition: color 0.15s;
  }
  .heat-btn:hover { color: var(--text); }
  .check-btn {
    width: 20px; height: 20px;
    border: 1px solid var(--border);
    border-radius: 50%; background: none;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    margin-top: 2px;
  }
  .check-btn:hover { border-color: var(--text); }
  .task.done .check-btn { background: var(--border); }
  .check-icon { width: 8px; height: 8px; display: none; }
  .task.done .check-icon { display: block; fill: var(--muted); }

  .u1 { background: var(--urgent1); box-shadow: 0 0 8px rgba(255,43,43,0.4); }
  .u2 { background: var(--urgent2); box-shadow: 0 0 6px rgba(255,106,0,0.3); }
  .u3 { background: var(--urgent3); box-shadow: 0 0 6px rgba(255,195,0,0.25); }
  .u4 { background: var(--neutral); }
  .u5 { background: var(--calm1); }
  .u6 { background: var(--calm2); box-shadow: 0 0 6px rgba(37,99,235,0.25); }
  .u7 { background: var(--calm3); }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 100;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #181818;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    padding: 28px 24px 40px;
    width: 100%; max-width: 680px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } }
  .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.05em; margin-bottom: 20px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .field input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.8rem;
    padding: 10px 12px; outline: none; border-radius: 2px;
    transition: border-color 0.15s; -webkit-appearance: none;
  }
  .field input:focus { border-color: var(--text); }

  .urgency-picker { display: flex; gap: 8px; align-items: center; }
  .urgency-pip {
    flex: 1; height: 28px; border-radius: 3px;
    cursor: pointer; opacity: 0.35;
    transition: opacity 0.15s, transform 0.15s; border: none;
  }
  .urgency-pip.selected { opacity: 1; transform: scaleY(1.15); }
  .pip1{background:var(--urgent1);} .pip2{background:var(--urgent2);}
  .pip3{background:var(--urgent3);} .pip4{background:var(--neutral);}
  .pip5{background:var(--calm1);}  .pip6{background:var(--calm2);}
  .pip7{background:var(--calm3);}
  .urgency-label-text { font-size: 0.55rem; letter-spacing: 0.08em; margin-top: 4px; color: var(--muted); text-align: center; }

  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-save {
    flex: 1; background: var(--text); color: var(--bg); border: none;
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 12px; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 12px 20px; cursor: pointer;
  }
  .btn-delete {
    background: none; border: 1px solid #3a1111; color: #ff2b2b;
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 12px 16px; cursor: pointer;
  }

  .status-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.7rem; letter-spacing: 0.1em; display: none; }
  .status-msg.show { display: block; }
  .status-msg .big { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; display: block; opacity: 0.15; margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <span class="band-name">Slender Pins</span>
  <span class="subtitle">EP Tasks</span>
  <div class="header-right">
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">connecting…</span>
    </div>
    <button class="add-btn" id="addBtn">+ Add Task</button>
  </div>
</header>

<div class="legend">
  <span class="legend-label">Urgency:</span>
  <div class="legend-item"><div class="legend-dot" style="background:#ff2b2b"></div> fire</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff6a00"></div> soon</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffc300"></div> this week</div>
  <div class="legend-item"><div class="legend-dot" style="background:#888"></div> whenever</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3a9bd5"></div> low</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div> someday</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1e3a8a"></div> backlog</div>
</div>

<div class="filter-bar">
  <button class="filter-chip active" data-filter="all">All</button>
  <button class="filter-chip" data-filter="open">Open</button>
  <button class="filter-chip" data-filter="done">Done</button>
</div>

<div class="board" id="board">
  <div class="status-msg show" id="loadingMsg"><span class="big">···</span>connecting</div>
  <div class="status-msg" id="emptyState"><span class="big">NO TASKS</span>hit + add task to get started</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">New Task</h2>
    <div class="field">
      <label>Task</label>
      <input type="text" id="f-title" placeholder="e.g. Book studio time" />
    </div>
    <div class="field">
      <label>Who's on it</label>
      <input type="text" id="f-assignee" placeholder="e.g. Jez, Sam…" />
    </div>
    <div class="field">
      <label>Due date (optional)</label>
      <input type="date" id="f-due" />
    </div>
    <div class="field">
      <label>Urgency</label>
      <div class="urgency-picker" id="urgencyPicker">
        <button class="urgency-pip pip1" data-u="1"></button>
        <button class="urgency-pip pip2" data-u="2"></button>
        <button class="urgency-pip pip3" data-u="3"></button>
        <button class="urgency-pip pip4 selected" data-u="4"></button>
        <button class="urgency-pip pip5" data-u="5"></button>
        <button class="urgency-pip pip6" data-u="6"></button>
        <button class="urgency-pip pip7" data-u="7"></button>
      </div>
      <div class="urgency-label-text" id="urgency-label">whenever</div>
    </div>
    <div class="modal-actions">
      <button class="btn-save" id="btnSave">Save Task</button>
      <button class="btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn-delete" id="btnDelete" style="display:none">Delete</button>
    </div>
  </div>
</div>

<script>
  const FB_URL = 'https://slender-pins-default-rtdb.europe-west1.firebasedatabase.app';
  const URGENCY_LABELS  = ['fire','soon','this week','whenever','low','someday','backlog'];
  const URGENCY_CLASSES = ['u1','u2','u3','u4','u5','u6','u7'];
  const POLL_MS = 4000;

  let tasks = {}, currentFilter = 'all', editingId = null, selectedUrgency = 4, pollTimer = null;

  const api = (sub) => FB_URL + '/tasks' + (sub || '') + '.json';

  async function fbGet() {
    const r = await fetch(api(), { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }
  async function fbSet(id, data) {
    const r = await fetch(api('/' + id), { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    if (!r.ok) throw new Error(r.status);
  }
  async function fbDel(id) {
    await fetch(api('/' + id), { method: 'DELETE' });
  }

  async function poll() {
    try {
      const data = await fbGet();
      tasks = data || {};
      document.getElementById('syncDot').className = 'sync-dot live';
      document.getElementById('syncLabel').textContent = 'live';
      document.getElementById('loadingMsg').classList.remove('show');
      render();
    } catch(e) {
      document.getElementById('syncDot').className = 'sync-dot error';
      document.getElementById('syncLabel').textContent = 'error';
    }
  }

  function startPolling() { poll(); pollTimer = setInterval(poll, POLL_MS); }

  function selectUrgency(u) {
    selectedUrgency = u;
    document.querySelectorAll('.urgency-pip').forEach(p => p.classList.toggle('selected', +p.dataset.u === u));
    document.getElementById('urgency-label').textContent = URGENCY_LABELS[u - 1];
  }

  function openModal(id) {
    editingId = id || null;
    const t = id && tasks[id];
    document.getElementById('modalTitle').textContent = id ? 'Edit Task' : 'New Task';
    document.getElementById('btnDelete').style.display = id ? '' : 'none';
    document.getElementById('f-title').value    = t ? t.title : '';
    document.getElementById('f-assignee').value = t ? (t.assignee || '') : '';
    document.getElementById('f-due').value      = t ? (t.due || '') : '';
    selectUrgency(t ? (t.urgency || 4) : 4);
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 120);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editingId = null;
  }

  async function saveTask() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }
    const id  = editingId || uid();
    const old = editingId && tasks[editingId];
    const task = { id, title, assignee: document.getElementById('f-assignee').value.trim(), due: document.getElementById('f-due').value, urgency: selectedUrgency, done: old ? old.done : false, created: old ? old.created : Date.now() };
    closeModal(); tasks[id] = task; render();
    try { await fbSet(id, task); } catch(e) { console.error(e); }
  }

  async function deleteTask() {
    if (!confirm('Delete this task?')) return;
    const id = editingId; closeModal(); delete tasks[id]; render();
    try { await fbDel(id); } catch(e) {}
  }

  async function toggleDone(id) {
    const t = tasks[id]; if (!t) return;
    t.done = !t.done; render();
    try { await fbSet(id, t); } catch(e) {}
  }

  async function nudgeUrgency(id, dir) {
    const t = tasks[id]; if (!t) return;
    t.urgency = Math.min(7, Math.max(1, (t.urgency || 4) + dir)); render();
    try { await fbSet(id, t); } catch(e) {}
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
    render();
  }

  function formatDue(due) {
    if (!due) return null;
    const d = new Date(due + 'T00:00:00'), now = new Date(); now.setHours(0,0,0,0);
    const diff = Math.round((d - now) / 86400000);
    if (diff < 0)   return { text: Math.abs(diff) + 'd overdue', overdue: true };
    if (diff === 0) return { text: 'today', overdue: false };
    if (diff === 1) return { text: 'tomorrow', overdue: false };
    if (diff < 7)   return { text: 'in ' + diff + 'd', overdue: false };
    return { text: d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }), overdue: false };
  }

  function render() {
    const board = document.getElementById('board');
    board.querySelectorAll('.task').forEach(el => el.remove());
    let list = Object.values(tasks);
    if (currentFilter === 'open') list = list.filter(t => !t.done);
    if (currentFilter === 'done') list = list.filter(t => t.done);
    list.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      if (a.urgency !== b.urgency) return a.urgency - b.urgency;
      if (a.due && b.due) return a.due.localeCompare(b.due);
      if (a.due) return -1; if (b.due) return 1;
      return b.created - a.created;
    });
    document.getElementById('emptyState').classList.toggle('show', list.length === 0);
    list.forEach(t => {
      const uc  = URGENCY_CLASSES[(t.urgency || 4) - 1];
      const due = formatDue(t.due);
      const el  = document.createElement('div');
      el.className = 'task' + (t.done ? ' done' : '');
      el.dataset.id = t.id;
      el.innerHTML =
        '<div class="urgency-bar ' + uc + '"></div>' +
        '<div class="task-body">' +
          '<div class="task-title">' + esc(t.title) + '</div>' +
          '<div class="task-meta">' +
            (t.assignee ? '<span class="task-assignee">' + esc(t.assignee) + '</span>' : '') +
            (due ? '<span class="task-due' + (due.overdue ? ' overdue' : '') + '">' + due.text + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="task-actions">' +
          '<button class="heat-btn" data-action="up" data-id="' + t.id + '">▲</button>' +
          '<button class="check-btn" data-action="check" data-id="' + t.id + '">' +
            '<svg class="check-icon" viewBox="0 0 8 8"><polyline points="1,4 3,6 7,2" stroke-width="1.5" stroke="currentColor" fill="none"/></svg>' +
          '</button>' +
          '<button class="heat-btn" data-action="down" data-id="' + t.id + '">▼</button>' +
        '</div>';
      board.appendChild(el);
    });
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }
  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // Single event listener for everything
  document.addEventListener('click', function(e) {
    const el = e.target;

    // Filter chips
    const fc = el.closest('.filter-chip');
    if (fc) { setFilter(fc.dataset.filter); return; }

    // Urgency pips
    const pip = el.closest('.urgency-pip');
    if (pip) { selectUrgency(+pip.dataset.u); return; }

    // Add task button
    if (el.id === 'addBtn') { openModal(); return; }

    // Modal save/cancel/delete
    if (el.id === 'btnSave')   { saveTask(); return; }
    if (el.id === 'btnCancel') { closeModal(); return; }
    if (el.id === 'btnDelete') { deleteTask(); return; }

    // Overlay background
    if (el.id === 'overlay') { closeModal(); return; }

    // Card actions
    const action = el.dataset && el.dataset.action;
    if (action === 'up')    { nudgeUrgency(el.dataset.id, -1); return; }
    if (action === 'down')  { nudgeUrgency(el.dataset.id, 1); return; }
    if (action === 'check') { toggleDone(el.dataset.id); return; }

    // Card tap — open modal
    const card = el.closest('.task');
    if (card && !el.closest('.task-actions')) { openModal(card.dataset.id); return; }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  startPolling();
</script>
</body>
</html>
